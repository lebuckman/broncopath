name: Sync Data

on:
  schedule:
    - cron: "0 10 1 * *"
  workflow_dispatch:

jobs:
  sync-data:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Run OSM sync
        run: npm run osm:sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 psycopg[binary] python-dotenv

      - name: Sync academics
        run: npm run academics:sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}